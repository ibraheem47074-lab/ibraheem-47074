version: '3.8'
services:
  web:
    image: php:8.1-apache
    container_name: pk-live-news
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html

  db:
    image: mysql:8.0
    container_name: pk-live-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pk_live_news
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pk-live-phpmyadmin
    ports:
      - "8081:80"
    depends_on:
      - db

volumes:
  mysql_data:
